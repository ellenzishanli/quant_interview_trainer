<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quant Interview Trainer</title>
  <meta name="description" content="Practice quant finance interview problems, track your progress, and learn the key ideas." />

  <!-- Apply saved theme before paint to avoid a flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("qt_theme");
        if (t !== "light" && t !== "dark") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <!-- Marked for Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">∑</span>
      <span id="brand-title" class="brand-title">Quant Interview Trainer</span>
    </div>
    <nav class="topnav">
      <a id="nav-dash" href="#/">Dashboard</a>
      <a id="nav-browse" href="#/browse">Browse</a>
      <a id="nav-list" href="#/list">My List</a>
      <a id="nav-leaderboard" href="#/leaderboard">Leaderboard</a>
    </nav>
    <div class="toolbar">
      <span id="auth-slot" class="auth-slot"></span>
      <button id="btn-lang" class="tool-btn lang-btn" title="切换中文" aria-label="Toggle language">中 / EN</button>
      <button id="btn-theme" class="tool-btn theme-btn" title="Toggle light / dark mode" aria-label="Toggle theme">☀️</button>
      <button id="btn-export" class="tool-btn" title="Download your progress">Export</button>
      <button id="btn-import" class="tool-btn" title="Load progress from a file">Import</button>
      <button id="btn-reset" class="tool-btn danger" title="Erase all progress">Reset</button>
      <input id="import-file" type="file" accept="application/json" hidden />
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div id="sidebar-chapters"></div>
    </aside>
    <main id="main" class="main"></main>
  </div>

  <!-- Firebase (compat SDK) — powers optional sign-in + discussion forum.
       Harmless if FIREBASE_CONFIG is null; everything else works offline. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="data/problems.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/forum.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
